<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Glowing filters -->
    <filter id="green-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="purple-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="cyan-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff79c6" />
      <stop offset="100%" stop-color="#bd93f9" />
    </linearGradient>
  </defs>

  <style>
    /* Styling */
    .wireframe-db { fill: none; stroke: rgba(255, 255, 255, 0.15); stroke-width: 2.5; stroke-linejoin: round; }
    .redis-plate { fill: url(#redisGrad); stroke: rgba(255, 255, 255, 0.3); stroke-width: 1.5; filter: url(#purple-glow); }
    
    /* Animations */
    .incoming-packet { fill: #8be9fd; filter: url(#cyan-glow); animation: fastIncoming 2s infinite linear; }
    .writeback-drip { fill: #bd93f9; filter: url(#purple-glow); animation: slowWriteback 3s infinite ease-in-out; }
    
    .db-pulse { transform-origin: 200px 290px; animation: dbPulseMotion 3s infinite ease-in-out; }

    /* Fast incoming requests from top to Redis (0.5s interval cycles) */
    @keyframes fastIncoming {
      0% { transform: translate(200px, 50px); opacity: 1; }
      45% { transform: translate(200px, 150px); opacity: 1; }
      48%, 100% { transform: translate(200px, 150px); opacity: 0; }
    }

    /* Slow Write-back drip from Redis buffer to Main DB */
    @keyframes slowWriteback {
      0%, 45% { transform: translate(200px, 170px) scale(0); opacity: 0; }
      50% { transform: translate(200px, 170px) scale(1); opacity: 1; }
      78% { transform: translate(200px, 265px) scale(1); opacity: 1; }
      82%, 100% { transform: translate(200px, 265px) scale(0); opacity: 0; }
    }

    /* DB indicator flashes when receiving writeback */
    @keyframes dbPulseMotion {
      0%, 72%, 95%, 100% { stroke: rgba(255, 255, 255, 0.15); filter: none; }
      80%, 90% { stroke: #50fa7b; filter: url(#green-glow); }
    }
  </style>

  <!-- Connection Line between Redis and DB -->
  <line x1="200" y1="160" x2="200" y2="270" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" stroke-dasharray="4 4" />

  <!-- Main Database Cylinder (Bottom) -->
  <g class="db-pulse">
    <!-- Top Lid -->
    <ellipse class="wireframe-db" cx="200" cy="270" rx="35" ry="9" />
    <!-- Cylinder body -->
    <path class="wireframe-db" d="M 165,270 L 165,310 A 35,9 0 0,0 235,310 L 235,270" />
    <ellipse class="wireframe-db" cx="200" cy="290" rx="35" ry="9" stroke-dasharray="4 4" opacity="0.5" />
    <ellipse class="wireframe-db" cx="200" cy="310" rx="35" ry="9" />
    <text x="200" y="338" fill="rgba(255, 255, 255, 0.25)" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">DATABASE</text>
  </g>

  <!-- Caching Redis Buffer Plate (Flat Bar) -->
  <g transform="translate(0, 0)">
    <rect class="redis-plate" x="130" y="148" width="140" height="24" rx="6" />
    <line x1="140" y1="160" x2="260" y2="160" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" stroke-dasharray="3 3" />
    <text x="200" y="132" fill="#bd93f9" font-family="sans-serif" font-size="10.5" text-anchor="middle" font-weight="bold">REDIS CACHE BUFFER</text>
  </g>

  <!-- Incoming Requests (cx/cy=0 for translation) -->
  <circle class="incoming-packet" cx="0" cy="0" r="4.5" style="animation-delay: 0s;" />
  <circle class="incoming-packet" cx="0" cy="0" r="4.5" style="animation-delay: 0.5s;" />
  <circle class="incoming-packet" cx="0" cy="0" r="4.5" style="animation-delay: 1s;" />
  <circle class="incoming-packet" cx="0" cy="0" r="4.5" style="animation-delay: 1.5s;" />

  <!-- Caching Writeback drop -->
  <circle class="writeback-drip" cx="0" cy="0" r="5" />

</svg>
