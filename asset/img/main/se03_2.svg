<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Glowing filters -->
    <filter id="green-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="red-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* Styling */
    .object-outline { stroke: rgba(255, 255, 255, 0.35); stroke-width: 2; fill: none; stroke-linejoin: round; }
    .object-detail { stroke: rgba(255, 255, 255, 0.12); stroke-width: 1.5; fill: none; }
    
    .box-red { stroke: #ff5555; stroke-width: 2; fill: rgba(255, 85, 85, 0.02); stroke-dasharray: 6 4; transform-origin: 200px 195px; animation: redBoxCycle 5s infinite ease-in-out; }
    .box-green { stroke: #50fa7b; stroke-width: 2.5; fill: rgba(80, 250, 123, 0.04); filter: url(#green-glow); transform-origin: 200px 197.5px; animation: greenBoxCycle 5s infinite ease-in-out; }
    .accuracy-badge { transform-origin: 200px 85px; animation: badgePop 5s infinite ease-in-out; }

    /* Red Box shakes and shifts */
    @keyframes redBoxCycle {
      0%, 40% { opacity: 0.8; transform: translate(-12px, -15px) rotate(-3deg); }
      20% { transform: translate(-16px, -11px) rotate(-2.5deg); }
      44%, 100% { opacity: 0; transform: translate(0px, 0px) scale(0.98) rotate(0deg); }
    }

    /* Green Box snaps to center and pulses */
    @keyframes greenBoxCycle {
      0%, 41% { opacity: 0; transform: scale(1.08); }
      45% { opacity: 1; transform: scale(0.98); }
      49%, 90% { opacity: 1; transform: scale(1); }
      95%, 100% { opacity: 0; transform: scale(1.03); }
    }

    /* Badge pop-up */
    @keyframes badgePop {
      0%, 46% { opacity: 0; transform: scale(0.7); }
      53%, 90% { opacity: 1; transform: scale(1); }
      95%, 100% { opacity: 0; transform: scale(0.8); }
    }
  </style>

  <!-- Central Target Object (Sleek Isometric Box/Store) -->
  <g transform="translate(0, 0)">
    <!-- Base Platform -->
    <polygon class="object-outline" points="200,260 140,230 200,200 260,230" />
    <!-- Pillars -->
    <line class="object-outline" x1="140" y1="230" x2="140" y2="160" />
    <line class="object-outline" x1="260" y1="230" x2="260" y2="160" />
    <line class="object-outline" x1="200" y1="260" x2="200" y2="190" />
    <!-- Back Pillar -->
    <line class="object-detail" x1="200" y1="190" x2="200" y2="120" />
    
    <!-- Top Roof -->
    <polygon class="object-outline" points="200,190 140,160 200,130 260,160" />
    <!-- Inner details -->
    <polygon class="object-detail" points="200,180 150,155 200,135 250,155" />
    <polygon class="object-detail" points="200,230 165,212 200,195 235,212" />
    <line class="object-detail" x1="165" y1="212" x2="165" y2="238" />
    <line class="object-detail" x1="235" y1="212" x2="235" y2="238" />
  </g>

  <!-- Bounding Boxes -->
  <!-- 1. RED BOX (Misaligned / Shaking) -->
  <rect class="box-red" x="135" y="125" width="130" height="145" rx="10" />
  
  <!-- 2. GREEN BOX (Calibrated / Snapped) -->
  <rect class="box-green" x="135" y="125" width="130" height="145" rx="10" />

  <!-- 99.8% Accuracy badge -->
  <g class="accuracy-badge" opacity="0">
    <rect x="150" y="85" width="100" height="20" rx="10" fill="#50fa7b" filter="url(#green-glow)" opacity="0.9" />
    <text x="200" y="99" fill="#282a36" font-family="sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">99.8% ACC</text>
  </g>

</svg>
